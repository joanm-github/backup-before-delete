    <script src="tailwind-config.js"></script>

    <div class="fixed inset-0 z-50 pointer-events-none opacity-30 bg-noise mix-blend-overlay"></div>
    <div class="fixed inset-0 z-50 pointer-events-none opacity-15 crt-overlay"></div>

    <div class="layout-container flex h-full grow flex-col">

                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                        <div class="group relative cursor-pointer overflow-hidden photo-frame aspect-[4/5] bg-black/20"
                            onclick="showModal('assets/2af12404-fb23-490f-a09b-b21768b307fc.JPG')">
                            <img src="assets/2af12404-fb23-490f-a09b-b21768b307fc.JPG"

                            </div>
                        </div>
                        <div class="group relative cursor-pointer overflow-hidden photo-frame aspect-[4/5] bg-black/20 lg:translate-y-12"
                            onclick="showModal('assets/ba77be7a-c151-4829-94da-861799d7b468.JPG')">
                            <img src="assets/ba77be7a-c151-4829-94da-861799d7b468.JPG"
                                class="w-full h-full object-cover grayscale contrast-125 opacity-70 group-hover:opacity-100 group-hover:grayscale-0 group-hover:scale-110 transition-all duration-700">
                            <div
                                class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                                <p class="text-[10px] font-mono text-mustard uppercase tracking-widest">Elena's Moog
                                    Setup • Live Input</p>
                            </div>
                        </div>
                        <div class="group relative cursor-pointer overflow-hidden photo-frame aspect-[4/5] bg-black/20"
                            onclick="showModal('assets/691e55f2-0bc4-438b-8d48-ead984704f85.JPG')">
                            <img src="assets/691e55f2-0bc4-438b-8d48-ead984704f85.JPG"

                            <div
                                class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                                <p class="text-[10px] font-mono text-mustard uppercase tracking-widest">Sofia • Tape

                            </div>
                        </div>
                    </div>
                </section>

                <!-- Era 2: 1975 - 1978 -->
                <section>
                    <div class="flex items-center gap-4 mb-8">
                        <h2 class="text-2xl font-bold uppercase tracking-widest text-mustard/80">1975 — 1978</h2>
                        <div class="h-px flex-1 bg-white/10"></div>

                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">

                </section>
            </div>

            <div class="mt-24 text-center">
                <p class="text-[#a1887f] uppercase tracking-[0.2em] text-xs">End of archive file.</p>
            </div>
    </div>
    </main>

    <div id="main-footer"></div>
    </div>

    <script src="components.js"></script>
    <script>
        // Use Intersection Observer for scroll-reveal animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('opacity-100', 'translate-y-0');
                    entry.target.classList.remove('opacity-0', 'translate-y-10');
                }
            });
        }, observerOptions);

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.photo-frame').forEach((el, index) => {
                el.classList.add('opacity-0', 'translate-y-10', 'transition-all', 'duration-700');
                el.style.transitionDelay = `${(index % 6) * 100}ms`;
                observer.observe(el);
            });
        });
    </script>
</body>

</html>
